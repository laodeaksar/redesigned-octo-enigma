name: my-ecommerce-dev

# =============================================================================
# Local development infrastructure
#
# Usage:
#   Start all:      docker compose -f docker-compose.dev.yml up -d
#   Start specific: docker compose -f docker-compose.dev.yml up -d postgres redis
#   Stop all:       docker compose -f docker-compose.dev.yml down
#   Reset volumes:  docker compose -f docker-compose.dev.yml down -v
#
# After migrating from RabbitMQ → BullMQ:
#   Redis now serves THREE roles:
#     1. Rate limiting         (api-gateway)
#     2. Response cache        (product-service)
#     3. Job queues            (all services via BullMQ)
# =============================================================================

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  # Used by: auth-service, product-service, payment-service, order-service (vouchers)
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_MULTIPLE_DATABASES: ecommerce_auth,ecommerce_products,ecommerce_payments
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/docker/create-multiple-pg-dbs.sh:/docker-entrypoint-initdb.d/create-dbs.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── MongoDB ─────────────────────────────────────────────────────────────────
  # Used by: order-service
  mongo:
    image: mongo:7-jammy
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Redis ────────────────────────────────────────────────────────────────────
  # Replaces BOTH the old Redis (cache) AND RabbitMQ (messaging).
  # Connect: redis://localhost:6379
  #
  # Bull Board (job queue dashboard) is available inside the admin app:
  #   http://localhost:3011/admin/queues
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --save 20 1
      --loglevel warning
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── MinIO (S3-compatible object storage) ─────────────────────────────────────
  # Used by: product-service (product images)
  # Console UI: http://localhost:9001 (minioadmin / minioadmin)
  # S3 API:     http://localhost:9000
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── MinIO bucket bootstrap ────────────────────────────────────────────────────
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin;
        mc mb --ignore-existing local/product-images;
        mc anonymous set download local/product-images;
        echo 'MinIO bucket ready.';
      "

  # ── Mailpit (fake SMTP + inbox UI) ───────────────────────────────────────────
  # Used by: email-worker (development)
  # Inbox UI:  http://localhost:8025
  # SMTP:      localhost:1025 (no auth required)
  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"
    environment:
      MP_MAX_MESSAGES: 200
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1

volumes:
  postgres_data:
  mongo_data:
  redis_data:
  minio_data:
