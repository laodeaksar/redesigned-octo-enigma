name: CD

on:
  push:
    branches: [main]
    # Only trigger when app or package source actually changes
    paths:
      - "apps/**"
      - "packages/**"
      - "docker-compose.prod.yml"
      - ".github/workflows/cd.yml"

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false   # never cancel a deployment in progress

env:
  BUN_VERSION: "1.1.x"
  REGISTRY:    ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/my-ecommerce

jobs:
  # ── Build & push Docker images ───────────────────────────────────────────────
  build-and-push:
    name: Build & Push — ${{ matrix.service }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - service: api-gateway
            port: 3000
          - service: auth-service
            port: 3001
          - service: product-service
            port: 3002
          - service: order-service
            port: 3003
          - service: payment-service
            port: 3004
          - service: email-worker
            port: null
          - service: web
            port: 3010
          - service: admin
            port: 3011

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/${{ matrix.service }}/Dockerfile
          push: true
          tags:   ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Layer caching — significantly speeds up rebuilds
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to:   type=gha,scope=${{ matrix.service }},mode=max
          build-args: |
            PUBLIC_API_URL=${{ vars.PUBLIC_API_URL }}
            PUBLIC_MIDTRANS_CLIENT_KEY=${{ secrets.MIDTRANS_CLIENT_KEY }}
            PUBLIC_MIDTRANS_IS_PRODUCTION=${{ vars.MIDTRANS_IS_PRODUCTION }}
            VITE_API_URL=${{ vars.PUBLIC_API_URL }}

  # ── Deploy to server ─────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build-and-push]
    environment: production   # requires manual approval in GitHub Environments settings
    # Only deploy from main branch
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: tag
        run: echo "sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Copy compose file to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host:     ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key:      ${{ secrets.DEPLOY_SSH_KEY }}
          source:   "docker-compose.prod.yml,.env.production.example"
          target:   "/srv/my-ecommerce"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key:      ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd /srv/my-ecommerce

            # Pull all new images
            docker compose -f docker-compose.prod.yml pull

            # Rolling restart — zero downtime for stateless services
            docker compose -f docker-compose.prod.yml up -d \
              --remove-orphans \
              --no-build

            # Run database migrations
            docker compose -f docker-compose.prod.yml exec -T auth-service \
              bun run db:migrate || echo "Migration already up-to-date"

            # Health check — wait up to 60s for api-gateway
            echo "Waiting for api-gateway to become healthy…"
            for i in $(seq 1 12); do
              if curl -sf http://localhost:3000/health > /dev/null; then
                echo "✓ api-gateway healthy"
                break
              fi
              echo "  attempt $i/12…"
              sleep 5
            done

            # Prune old images to save disk space
            docker image prune -f --filter "until=24h"

            echo "✓ Deployment complete — sha=${{ steps.tag.outputs.sha }}"

  # ── Notify on failure ────────────────────────────────────────────────────────
  notify-failure:
    name: Notify Failure
    runs-on: ubuntu-latest
    needs: [build-and-push, deploy]
    if: failure()
    steps:
      - name: Send failure notification
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": ":red_circle: *CD Failed* — `${{ github.repository }}` @ `${{ github.sha }}`\n${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
