# =============================================================================
# Alertmanager configuration
# Routes alerts to Slack (default) and email (critical)
# =============================================================================

global:
  # Default SMTP settings
  smtp_smarthost:    'smtp.resend.com:465'
  smtp_from:         'alerts@my-ecommerce.com'
  smtp_auth_username: 'resend'
  smtp_auth_password: '${SMTP_PASS}'
  smtp_require_tls:  true

  # Slack default channel
  slack_api_url: '${SLACK_WEBHOOK_URL}'

  # How long to wait before resending an alert
  resolve_timeout: 5m

# =============================================================================
# Templates
# =============================================================================

templates:
  - '/etc/alertmanager/templates/*.tmpl'

# =============================================================================
# Routing tree
# =============================================================================

route:
  # Default receiver for all alerts
  receiver: slack-warnings
  group_by: [alertname, service, severity]
  group_wait:      30s    # wait to batch alerts in same group
  group_interval:  5m     # how often to send grouped notifications
  repeat_interval: 4h     # how often to re-notify unresolved alerts

  routes:
    # Critical alerts → Slack #alerts-critical + email
    - matchers:
        - severity = critical
      receiver: slack-critical
      continue: true       # also send to next matching route

    - matchers:
        - severity = critical
      receiver: email-critical
      group_wait:      10s
      repeat_interval: 1h

    # Payment failures → dedicated Slack channel (high business impact)
    - matchers:
        - service = payment-service
        - severity =~ "critical|warning"
      receiver: slack-payments
      group_wait: 15s
      repeat_interval: 30m

    # Queue alerts → ops channel
    - matchers:
        - alertname =~ "BullMQ.*"
      receiver: slack-queues

    # Info/debug — silenced outside business hours (optional)
    - matchers:
        - severity = info
      receiver: slack-info
      group_wait:      5m
      repeat_interval: 24h

# =============================================================================
# Inhibition rules
# Service down inhibits all other alerts from the same service
# =============================================================================

inhibit_rules:
  - source_matchers:
      - alertname = ServiceDown
    target_matchers:
      - alertname =~ "HighErrorRate|SlowP99|HighMemory"
    equal: [service]

  # Critical inhibits warning for same alert
  - source_matchers:
      - severity = critical
    target_matchers:
      - severity = warning
    equal: [alertname, service]

# =============================================================================
# Receivers
# =============================================================================

receivers:

  - name: slack-warnings
    slack_configs:
      - channel: '#alerts-warning'
        title: '{{ template "slack.title" . }}'
        text:  '{{ template "slack.text" . }}'
        color: '{{ if eq .Status "firing" }}warning{{ else }}good{{ end }}'
        send_resolved: true

  - name: slack-critical
    slack_configs:
      - channel: '#alerts-critical'
        title: ':red_circle: CRITICAL — {{ template "slack.title" . }}'
        text:  '{{ template "slack.text" . }}'
        color: 'danger'
        send_resolved: true
        mention_channel: channel   # @channel mention for critical

  - name: slack-payments
    slack_configs:
      - channel: '#alerts-payments'
        title: ':credit_card: Payment Alert — {{ template "slack.title" . }}'
        text:  '{{ template "slack.text" . }}'
        color: '{{ if eq .Status "firing" }}danger{{ else }}good{{ end }}'
        send_resolved: true

  - name: slack-queues
    slack_configs:
      - channel: '#alerts-queues'
        title: ':mailbox: Queue Alert — {{ template "slack.title" . }}'
        text:  '{{ template "slack.text" . }}'
        color: '{{ if eq .Status "firing" }}warning{{ else }}good{{ end }}'
        send_resolved: true

  - name: slack-info
    slack_configs:
      - channel: '#alerts-info'
        title: ':information_source: {{ template "slack.title" . }}'
        text:  '{{ template "slack.text" . }}'
        send_resolved: false   # don't clutter info channel with resolves

  - name: email-critical
    email_configs:
      - to: 'oncall@my-ecommerce.com'
        headers:
          Subject: '[CRITICAL] {{ .GroupLabels.alertname }} — {{ .GroupLabels.service }}'
        html: '{{ template "email.html" . }}'
        send_resolved: true
