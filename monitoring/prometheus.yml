# =============================================================================
# Prometheus configuration
# =============================================================================

global:
  scrape_interval:     15s   # How often to scrape targets
  evaluation_interval: 15s   # How often to evaluate rules
  scrape_timeout:      10s

  # Attach these labels to every time series
  external_labels:
    environment: production
    project:     my-ecommerce

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]
      timeout: 10s

# Load alert rules
rule_files:
  - /etc/prometheus/rules/service-health.yml
  - /etc/prometheus/rules/queue-alerts.yml
  - /etc/prometheus/rules/business.yml

# =============================================================================
# Scrape configurations
# =============================================================================

scrape_configs:

  # ── Prometheus self-monitoring ─────────────────────────────────────────────
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # ── api-gateway ────────────────────────────────────────────────────────────
  - job_name: api-gateway
    metrics_path: /metrics
    static_configs:
      - targets: ["api-gateway:3000"]
        labels:
          service: api-gateway
    relabel_configs:
      - source_labels: [__address__]
        target_label:  instance

  # ── auth-service ───────────────────────────────────────────────────────────
  - job_name: auth-service
    metrics_path: /metrics
    static_configs:
      - targets: ["auth-service:3001"]
        labels:
          service: auth-service

  # ── product-service ────────────────────────────────────────────────────────
  - job_name: product-service
    metrics_path: /metrics
    static_configs:
      - targets: ["product-service:3002"]
        labels:
          service: product-service

  # ── order-service ──────────────────────────────────────────────────────────
  - job_name: order-service
    metrics_path: /metrics
    static_configs:
      - targets: ["order-service:3003"]
        labels:
          service: order-service

  # ── payment-service ────────────────────────────────────────────────────────
  - job_name: payment-service
    metrics_path: /metrics
    static_configs:
      - targets: ["payment-service:3004"]
        labels:
          service: payment-service

  # ── email-worker (separate metrics port) ──────────────────────────────────
  - job_name: email-worker
    metrics_path: /metrics
    static_configs:
      - targets: ["email-worker:9091"]
        labels:
          service: email-worker

  # ── Node exporters (host metrics — add one per VM/container host) ──────────
  - job_name: node-exporter
    static_configs:
      - targets: ["node-exporter:9100"]

  # ── Redis exporter ─────────────────────────────────────────────────────────
  - job_name: redis
    static_configs:
      - targets: ["redis-exporter:9121"]
        labels:
          service: redis

  # ── MongoDB exporter ───────────────────────────────────────────────────────
  - job_name: mongodb
    static_configs:
      - targets: ["mongodb-exporter:9216"]
        labels:
          service: mongodb

  # ── PostgreSQL exporter ────────────────────────────────────────────────────
  - job_name: postgres
    static_configs:
      - targets: ["postgres-exporter:9187"]
        labels:
          service: postgres
