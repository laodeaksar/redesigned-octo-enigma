# docker-compose.yml — Local development infrastructure
# Starts: Postgres, MongoDB, Redis
# Apps run via `pnpm dev` (Turborepo), not Docker

version: "3.9"

services:

  # ─── Postgres (service-inventory) ─────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: ecom_postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB:       ecommerce_inventory
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── MongoDB (service-order) ───────────────────────────────────────────────
  mongo:
    image: mongo:7-jammy
    container_name: ecom_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: ecommerce_orders
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis (rate-limiter + BullMQ queues) ──────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: ecom_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis UI (optional, dev only) ────────────────────────────────────────
  redis-ui:
    image: rediscommander/redis-commander:latest
    container_name: ecom_redis_ui
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      REDIS_HOSTS: local:redis:6379
    depends_on:
      - redis
    profiles: ["tools"]

  # ─── Mongo Express (optional, dev only) ───────────────────────────────────
  mongo-express:
    image: mongo-express:latest
    container_name: ecom_mongo_express
    restart: unless-stopped
    ports:
      - "8082:8081"
    environment:
      ME_CONFIG_MONGODB_SERVER: mongo
      ME_CONFIG_BASICAUTH:      false
    depends_on:
      - mongo
    profiles: ["tools"]

volumes:
  postgres_data:
  mongo_data:
  redis_data:

# ─── Usage ────────────────────────────────────────────────────────────────────
# Start infra:          docker compose up -d
# Start with UI tools:  docker compose --profile tools up -d
# Stop all:             docker compose down
# Wipe volumes:         docker compose down -v
